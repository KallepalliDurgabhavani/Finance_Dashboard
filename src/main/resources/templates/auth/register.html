<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — FinanceOS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="auth-logo-mark">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
        </svg>
      </div>
      <div class="auth-title">Create Account</div>
      <div class="auth-sub">Join FinanceOS — it's free</div>
    </div>

    <div th:if="${error}" class="alert alert-error">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;flex-shrink:0">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      </svg>
      <span th:text="${error}">Error message</span>
    </div>

    <form th:action="@{/register}" method="post">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-control" type="text" name="username"
               placeholder="Choose a username" required autofocus/>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-control" type="email" name="email"
               placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password"
               placeholder="Create a strong password" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
        Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a th:href="@{/login}">Sign in</a>
    </div>

  </div>
</div>
</body>
</html>
