<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Record Form — FinanceOS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo"><span>FinanceOS</span><small>Financial Dashboard</small></div>
    <div class="nav-section">Main</div>
    <a th:href="@{/dashboard}" class="nav-link">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Dashboard
    </a>
    <a th:href="@{/records}" class="nav-link">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Records
    </a>
    <a th:href="@{/records/new}" class="nav-link active">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      Add Record
    </a>
    <sec:authorize access="hasRole('ADMIN')">
      <div class="nav-section">Admin</div>
      <a th:href="@{/admin/users}" class="nav-link">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        User Management
      </a>
    </sec:authorize>
    <div class="sidebar-bottom">
      <div class="user-pill">
        <div class="user-avatar">
          <sec:authentication property="name" var="uname"/>
          <span th:text="${#strings.toUpperCase(#strings.substring(uname,0,1))}">A</span>
        </div>
        <div class="user-info">
          <div class="user-name" th:text="${uname}">admin</div>
          <div class="user-role">
            <sec:authorize access="hasRole('ADMIN')">Admin</sec:authorize>
            <sec:authorize access="hasRole('ANALYST')">Analyst</sec:authorize>
            <sec:authorize access="hasRole('VIEWER')">Viewer</sec:authorize>
          </div>
        </div>
        <form th:action="@{/logout}" method="post">
          <button type="submit" class="logout-btn">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          </button>
        </form>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title" th:text="${record.id == null} ? 'New Record' : 'Edit Record'">New Record</div>
        <div class="page-subtitle" th:text="${record.id == null} ? 'Add a new financial transaction' : 'Update transaction details'">Add a new financial transaction</div>
      </div>
    </div>

    <div class="card form-page">
      <form th:action="${record.id == null} ? @{/records/new} : @{/records/edit/{id}(id=${record.id})}"
            method="post" th:object="${record}">

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Amount (₹)</label>
            <input class="form-control" type="number" step="0.01" min="0.01"
                   th:field="*{amount}" placeholder="0.00" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Type</label>
            <select class="form-control" th:field="*{type}" required>
              <option value="">Select type</option>
              <option value="INCOME">Income</option>
              <option value="EXPENSE">Expense</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Category</label>
            <input class="form-control" type="text" th:field="*{category}"
                   placeholder="e.g. Salary, Food, Rent" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Date</label>
            <input class="form-control" type="date" th:field="*{date}" required/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Notes (optional)</label>
          <textarea class="form-control" th:field="*{notes}"
                    placeholder="Add a description or note..."
                    rows="3" style="resize:vertical"></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:16px;height:16px">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
            <span th:text="${record.id == null} ? 'Save Record' : 'Update Record'">Save Record</span>
          </button>
          <a th:href="@{/records}" class="btn btn-ghost">Cancel</a>
        </div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      </form>
    </div>
    <form th:action="@{/logout}" method="post">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
  <button type="submit" class="logout-btn">...</button>
</form>
  </main>
</div>
</body>
</html>
