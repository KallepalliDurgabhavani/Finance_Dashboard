<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Management — FinanceOS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-logo"><span>FinanceOS</span><small>Financial Dashboard</small></div>
    <div class="nav-section">Main</div>
    <a th:href="@{/dashboard}" class="nav-link">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Dashboard
    </a>
    <a th:href="@{/records}" class="nav-link">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Records
    </a>
    <a th:href="@{/records/new}" class="nav-link">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      Add Record
    </a>
    <div class="nav-section">Admin</div>
    <a th:href="@{/admin/users}" class="nav-link active">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
      User Management
    </a>
    <div class="sidebar-bottom">
      <div class="user-pill">
        <div class="user-avatar">
          <sec:authentication property="name" var="uname"/>
          <span th:text="${#strings.toUpperCase(#strings.substring(uname,0,1))}">A</span>
        </div>
        <div class="user-info">
          <div class="user-name" th:text="${uname}">admin</div>
          <div class="user-role">Admin</div>
        </div>
        <form th:action="@{/logout}" method="post">
          <button type="submit" class="logout-btn">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          </button>
        </form>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">User Management</div>
        <div class="page-subtitle">Manage accounts, roles, and access levels</div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-header">
        <div class="table-title">All Users</div>
        <span style="font-size:13px;color:var(--muted)"
              th:text="${#lists.size(users)} + ' total'">0 total</span>
      </div>

      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="user : ${users}">

            <td>
              <div style="display:flex;align-items:center;gap:10px">
                <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#4f7dff,#7c5cfc);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:white;flex-shrink:0"
                     th:text="${#strings.toUpperCase(#strings.substring(user.username,0,1))}">A</div>
                <span style="font-weight:500" th:text="${user.username}">username</span>
              </div>
            </td>

            <td style="color:var(--muted);font-size:13px"
                th:text="${user.email}">email</td>

            <td>
              <span th:each="role : ${user.roles}">
                <span th:if="${role.name == 'ROLE_ADMIN'}"   class="badge badge-admin">Admin</span>
                <span th:if="${role.name == 'ROLE_ANALYST'}" class="badge badge-analyst">Analyst</span>
                <span th:if="${role.name == 'ROLE_VIEWER'}"  class="badge badge-viewer">Viewer</span>
              </span>
            </td>

            <td>
              <span th:if="${user.active}"  class="badge badge-active">Active</span>
              <span th:if="${!user.active}" class="badge badge-inactive">Inactive</span>
            </td>

            <td>
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">

                <!-- Toggle active/inactive — th:action handles CSRF automatically -->
                <form th:action="@{/admin/users/{id}/toggle(id=${user.id})}"
                      method="post">
                  <input type="hidden" th:name="${_csrf.parameterName}"
                         th:value="${_csrf.token}"/>
                  <button type="submit"
                          th:class="${user.active} ? 'btn btn-danger btn-sm' : 'btn btn-success btn-sm'"
                          th:text="${user.active} ? 'Deactivate' : 'Activate'">
                    Toggle
                  </button>
                </form>

                <!-- Assign role — th:action handles CSRF automatically -->
                <form th:action="@{/admin/users/{id}/role(id=${user.id})}"
                      method="post" class="role-form">
                  <input type="hidden" th:name="${_csrf.parameterName}"
                         th:value="${_csrf.token}"/>
                  <select name="roleName">
                    <option value="ROLE_VIEWER">Viewer</option>
                    <option value="ROLE_ANALYST">Analyst</option>
                    <option value="ROLE_ADMIN">Admin</option>
                  </select>
                  <button type="submit" class="btn btn-ghost btn-sm">Assign</button>
                </form>

              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
</body>
</html>
